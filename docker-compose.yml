version: "3.8"

services:
  comfyapi:
    image: vacation/comfyui-image-api:dev
    container_name: comfyapi
    restart: unless-stopped
    user: "${UID}:${GID}"
    environment:
      - COMFYUI_IMAGE_API_KEY=${COMFYUI_IMAGE_API_KEY}
    volumes:
      - ${MODEL_DIR}:${MODEL_DIR}
    command:
      - --model-path
      - ${MODEL_DIR}/${MODEL_NAME}
      - --api-key
      - ${COMFYUI_IMAGE_API_KEY}
      - --max-queue
      - ${MAX_QUEUE}
    expose:
      - "8888"
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]

  caddy:
    image: caddy:2
    container_name: comfyapi-proxy
    restart: unless-stopped
    user: "${UID}:${GID}"
    ports:
      - "80:80"
      - "8443:8443"
    cap_add:
      - NET_BIND_SERVICE
    environment:
      - CADDY_EMAIL=${CADDY_EMAIL}
      - CADDY_HOSTNAME=${CADDY_HOSTNAME}
      - COMFYUI_IMAGE_API_KEY=${COMFYUI_IMAGE_API_KEY}
    volumes:
      - ./caddy_data:/data
      - ./caddy_config:/config
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
