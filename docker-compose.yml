services:
  comfyui:
    build:
      context: .                       # build starts in your project root
      dockerfile: docker/comfyui.Dockerfile
    container_name: comfyui
    # override the NVIDIA entrypoint so we call python3 directly
    entrypoint: ["python3","main.py"]
    command:
      - "--listen"
      - "0.0.0.0"
      - "--port"
      - "8188"
      - "--output-directory"
      - "/outputs"

    volumes:
      - ${MODEL_DIR}:${MODEL_DIR}:ro
      - ./outputs:/outputs
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8188/queue || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  comfyapi:
    image: vacation/comfyui-image-api:dev
    container_name: comfyapi
    restart: unless-stopped
    user: "${UID}:${GID}"
    environment:
      COMFYUI_IMAGE_API_KEY: ${COMFYUI_IMAGE_API_KEY}
      COMFYUI_HOST: comfyui
      COMFYUI_PORT: 8188
    volumes:
      - ${MODEL_DIR}:${MODEL_DIR}
      - ./outputs:/outputs
    command:
      - --model-path
      - ${MODEL_DIR}/${MODEL_NAME}
      - --api-key
      - ${COMFYUI_IMAGE_API_KEY}
    expose:
      - "8888"
    depends_on:
      comfyui:
        condition: service_healthy

  caddy:
    image: caddy:2
    container_name: comfyapi-proxy
    restart: unless-stopped
    user: "${UID}:${GID}"
    ports:
      - "80:80"
      - "8443:8443"
    cap_add:
      - NET_BIND_SERVICE
    environment:
      CADDY_EMAIL: ${CADDY_EMAIL}
      CADDY_HOSTNAME: ${CADDY_HOSTNAME}
      COMFYUI_IMAGE_API_KEY: ${COMFYUI_IMAGE_API_KEY}
    volumes:
      - ./caddy_data:/data
      - ./caddy_config:/config
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
